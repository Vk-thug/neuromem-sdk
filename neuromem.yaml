neuromem:
  model:
    # Embedding model for vector representations.
    # v0.4.1 default: local Ollama `nomic-embed-text` (768-dim), matches
    # `storage.vector_store.config.vector_size` below and works without an
    # OPENAI_API_KEY. Switch to `text-embedding-3-large` (3072) if you want
    # OpenAI quality — remember to also bump `vector_size` to 3072 BEFORE
    # the Qdrant collection is created (the dimension is locked at create-time).
    embedding: nomic-embed-text

    # LLM for memory consolidation, auto-tagging, entity extraction, and
    # multi-hop query decomposition. v0.4.1 routes any model name with an
    # `ollama/` prefix (or a known local family like qwen/llama/mistral/gpt-oss)
    # to the local Ollama server; everything else hits OpenAI.
    consolidation_llm: ollama/qwen2.5-coder:7b

  storage:
    # Database backend
    database:
      type: memory  # Options: postgres | sqlite | memory
      # url: postgresql://user:pass@localhost:5432/neuromem  # For postgres
      # url: neuromem.db  # For sqlite
      url: null  # For in-memory

    # Vector store — v0.4.0: Qdrant is the default. If Qdrant is not reachable
    # at startup (no service on host:port), NeuroMem falls back to the in-memory
    # backend and logs a warning. To pin in-memory explicitly, set type: memory.
    vector_store:
      type: qdrant  # Options: qdrant | postgres | sqlite | memory
      config:
        host: localhost
        port: 6333
        collection_name: neuromem
        # vector_size matches the embedding model in `model.embedding` above:
        # 384 for all-MiniLM-L6-v2, 768 for nomic-embed-text,
        # 1536/3072 for text-embedding-3-large.
        vector_size: 768
      collection: user_memory

    # Cache configuration (optional)
    cache:
      type: memory  # Options: redis | memory
      ttl_seconds: 3600

  memory:
    # Enable memory decay
    decay_enabled: true
    
    # Consolidate episodic memories every N turns
    consolidation_interval: 10
    
    # Maximum active memories to keep in context
    max_active_memories: 50
    
    # How long to keep episodic memories before decay
    episodic_retention_days: 30
    
    # Minimum confidence threshold for retrieval
    min_confidence_threshold: 0.3

  # Brain-inspired optimization settings
  consolidation:
    enabled: true
    extract_facts: true
    create_summaries: true
    apply_forgetting: true
    min_confidence: 0.7
    decay_threshold: 0.3
  
  embeddings:
    optimization_enabled: true
    dimension_reduction:
      enabled: true
      target_dims: 512
      age_threshold_days: 30
    quantization:
      enabled: true
      dtype: int8
    deduplication:
      enabled: true
      similarity_threshold: 0.95
  
  tagging:
    auto_tag_enabled: true
    max_tags_per_memory: 10
    extract_entities: true
    classify_intent: true
    analyze_sentiment: true
  
  retrieval:
    hybrid_enabled: true
    recency_weight: 0.2
    importance_weight: 0.3
    similarity_weight: 0.5
    recency_half_life_days: 30

  # Phase 2+: Async & Proactive Intelligence
  # NOTE: async observe has no flush()/drain() API, so writes are not visible
  # until the background worker pulls them off the queue. Keep `false` for
  # local dev / setup verification; flip `true` for production throughput.
  async:
    enabled: false
    critical_queue_size: 1000
    high_queue_size: 500
    medium_queue_size: 100
    low_queue_size: 50
    background_queue_size: 10
    salience_threshold: 0.7  # Never drop tasks above this salience
  
  proactive:
    auto_consolidate_threshold: 10  # Consolidate every N episodic memories
    consolidation_interval_minutes: 60  # Or every N minutes
    optimization_interval_hours: 24  # Re-embed optimization daily
    decay_interval_hours: 168  # Apply decay weekly
    reconsolidation_enabled: true
    min_retrieval_for_reconsolidation: 3
    context_similarity_threshold: 0.8

  # Inngest Workflow Configuration
  # Requires: pip install neuromem-sdk[inngest]
  # Dev server: npx inngest-cli@latest dev -u http://127.0.0.1:8000/api/inngest --no-discovery
  workflows:
    enabled: false  # Set true to use Inngest instead of threading workers
    app_id: neuromem
    is_production: false
    server:
      host: 0.0.0.0
      port: 8000
    cron:
      consolidation: "0 */2 * * *"     # Every 2 hours
      decay: "0 3 * * *"               # Daily at 3 AM
      optimization: "0 4 * * 0"        # Weekly on Sunday at 4 AM
      health_check: "*/15 * * * *"     # Every 15 minutes
    concurrency:
      observe: 20                       # Max concurrent observe processing
      consolidation: 5                  # Max concurrent consolidation jobs
    retries:
      observe: 3
      consolidation: 2
      decay: 2
      optimization: 1
