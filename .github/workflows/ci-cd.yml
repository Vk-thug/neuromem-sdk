name: CI/CD

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish_target:
        description: "Where to publish"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi
          - both

permissions:
  contents: write
  id-token: write

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Lint + Test across Python versions
  # ─────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check neuromem/

      - name: Format check with black
        if: matrix.python-version == '3.12'
        run: black neuromem/ --line-length 100 --check

      - name: Run tests
        run: pytest tests/ --tb=short -q --ignore=tests/test_mcp.py

      - name: Run tests with coverage
        if: matrix.python-version == '3.12'
        run: pytest tests/ --cov=neuromem --cov-report=xml --ignore=tests/test_mcp.py

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ─────────────────────────────────────────
  # JOB 2: Build sdist + wheel
  # ─────────────────────────────────────────
  build:
    name: Build distributions
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify distributions
        run: |
          pip install twine
          twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  # ─────────────────────────────────────────
  # JOB 3: Publish to TestPyPI (canary)
  # Runs on: push to main + manual dispatch
  # ─────────────────────────────────────────
  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && (
        github.event.inputs.publish_target == 'testpypi' ||
        github.event.inputs.publish_target == 'both'
      ))
    environment:
      name: testpypi
      url: https://test.pypi.org/project/neuromem-sdk/
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  # ─────────────────────────────────────────
  # JOB 4: Create GitHub Release
  # Runs on: tag push only
  # ─────────────────────────────────────────
  github-release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "NeuroMem SDK v${{ env.VERSION }}"
          body_path: RELEASE_NOTES_v${{ env.VERSION }}.md
          files: dist/*
          make_latest: true
          draft: false
          prerelease: false

  # ─────────────────────────────────────────
  # JOB 5: Publish to PyPI (production)
  # Runs on: tag push — requires environment approval
  # ─────────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    needs: [build, github-release]
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && (
        github.event.inputs.publish_target == 'pypi' ||
        github.event.inputs.publish_target == 'both'
      ))
    environment:
      name: pypi
      url: https://pypi.org/project/neuromem-sdk/
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
